services:
  # ============================================================
  # FastAPI Backend — Render Web Service
  # ============================================================
  - type: web
    name: ai-research-copilot-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn index:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      # ── AI Provider ────────────────────────────────────────
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
      # ── Vector DB ──────────────────────────────────────────
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: PINECONE_ENVIRONMENT
        value: "us-east-1"
      # ── Database ───────────────────────────────────────────
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: "trishul_db"
      # ── Auth ───────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false
        generateValue: true
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # ── App ────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false
      - key: DEBUG
        value: "false"
      # ── Cache (optional) ───────────────────────────────────
      - key: REDIS_URL
        sync: false
