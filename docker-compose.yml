version: '3.9'

networks:
  copilot-network:
    driver: bridge

volumes:
  backend_data:

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: trivisionx-ai-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - ./backend/.env
    environment:
      - PORT=8000
    networks:
      - copilot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "https://trivisionx-ai.onrender.com/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trivisionx-ai-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=https://trivisionx-ai.onrender.com
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - copilot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
